name: Build and Release

on:
  push:
    branches: [ main ]
    paths: [ 'version' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $v = (Get-Content version -Raw).Trim()
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Generate release notes
        shell: pwsh
        run: |
          $repo = "${{ github.server_url }}/${{ github.repository }}"
          $prev = git log --pretty=format:"%H" --skip=1 -n 1 version
          if ($prev) {
            $raw = git log $prev..HEAD --pretty=format:"%H|%s"
          } else {
            $raw = git log --pretty=format:"%H|%s"
          }

          $groups = @{}
          $lines = $raw -split "`r`n"
          foreach ($line in $lines) {
            if ([string]::IsNullOrWhiteSpace($line)) { continue }
            $hash, $subject = $line -split '\|', 2
            $short = $hash.Substring(0, 7)
            $link = "$repo/commit/$hash"
            if ($subject -match '^(\w+)(\([^)]+\))?!?:\s*(.*)') {
              $type = $matches[1]
              $desc = $matches[3]
              $entry = "- $desc ([$short]($link))"
            } else {
              $type = "other"
              $entry = "- $subject ([$short]($link))"
            }
            if (-not $groups.ContainsKey($type)) { $groups[$type] = @() }
            $groups[$type] += $entry
          }

          $sectionNames = @{
            "feat"     = "Features"
            "fix"      = "Bug Fixes"
            "perf"     = "Performance Improvements"
            "refactor" = "Code Refactoring"
            "chore"    = "Chores"
            "docs"     = "Documentation"
            "test"     = "Tests"
            "style"    = "Style"
            "revert"   = "Reverts"
            "ci"       = "CI"
            "build"    = "Build"
            "other"    = "Other Changes"
          }

          $parts = @("## Changelog`n")
          foreach ($type in $groups.Keys | Sort-Object) {
            $display = $sectionNames[$type]
            if (-not $display) { $display = "$type" }
            $parts += "### $display`n"
            $parts += ($groups[$type] -join "`n")
            $parts += "`n"
          }

          $parts -join "`n" | Out-File -FilePath release_notes.md -Encoding UTF8

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build with Cargo
        run: cargo build --release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: |
            target/release/keymouse-monitor.exe
            index.html
