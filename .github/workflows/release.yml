name: Build and Release

on:
  push:
    branches: [ main ]
    paths: [ 'version' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $v = (Get-Content version -Raw).Trim()
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Generate release notes
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $content = Get-Content CHANGELOG.md -Raw
          # Match ## [<version>] ... (everything up to next ## [ or EOF)
          $pattern = "## \[$ver\].*?(?=\n## \[|\z)"
          $match = [regex]::Match($content, $pattern, [System.Text.RegularExpressions.RegexOptions]::Singleline)
          if ($match.Success) {
            $match.Value | Out-File -FilePath release_notes.md -Encoding UTF8
          } else {
            "No changelog entry for v$ver" | Out-File -FilePath release_notes.md -Encoding UTF8
          }

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build with Cargo
        run: cargo build --release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: |
            target/release/keymouse-monitor.exe
            index.html
